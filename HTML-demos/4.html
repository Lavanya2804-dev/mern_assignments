<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--form-->
    <form>
        <!--username-->
        <div>
            <label for="">UserName</label>
            <input type="text" name="UserName" id="un" required minlength="4">
        </div>
        <!--password-->
        <div>
            <label for="">Password</label>
            <input type="text" name="Password" id="">
        </div>
        <!--email-->
        <div>
            <label for="">Email</label>
            <input type="text" name="Email" id="">
        </div>
        <!--date of birth-->
        <div>
            <label for="DOB">DateOfBirth</label>
            <input type="date" name="DateOfBirth" id="DOB">
        </div>
        <!--skills-->
        <div>
            <input type="checkbox" name="html" id="html">
            <label for="html">html</label>
        </div>
         <div>
            <input type="checkbox" name="react" id="react">
            <label for="react">react</label>
        </div>
        <!--gender-->
        <label for="gender">select gender</label>
         <div>
            <input type="radio" name="gender" id="male">
            <label for="male">male</label>
        </div>
        <div>
            <input type="radio" name="gender" id="female">
            <label for="female">female</label>
        </div>

        <div>
            <label for="">Select the state</label>
            <select name="state" id="state">
                <option value="tg">telanagana</option>
                <option value="tg">Andhra pradesh</option>
            </select>

        </div>
        <!--submit button-->
        <button  type="submit">Resigter</button>
    </form>
    
</body>
</html>
